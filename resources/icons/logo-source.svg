<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="clawGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c23152"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#glowGrad)"/>

  <!-- Monitor body -->
  <rect x="96" y="80" width="320" height="240" rx="20" fill="#2a2a4a" stroke="#3a3a5a" stroke-width="4"/>

  <!-- Screen -->
  <rect x="112" y="96" width="288" height="196" rx="12" fill="url(#screenGrad)"/>

  <!-- Screen content - code lines -->
  <rect x="136" y="120" width="120" height="8" rx="4" fill="#4ecca3" opacity="0.7"/>
  <rect x="136" y="140" width="180" height="8" rx="4" fill="#e94560" opacity="0.5"/>
  <rect x="156" y="160" width="140" height="8" rx="4" fill="#4ecca3" opacity="0.4"/>
  <rect x="156" y="180" width="100" height="8" rx="4" fill="#e94560" opacity="0.6"/>
  <rect x="136" y="200" width="160" height="8" rx="4" fill="#4ecca3" opacity="0.5"/>
  <rect x="136" y="220" width="80" height="8" rx="4" fill="#e94560" opacity="0.4"/>
  <rect x="136" y="240" width="200" height="8" rx="4" fill="#4ecca3" opacity="0.3"/>

  <!-- Cursor blink -->
  <rect x="340" y="236" width="4" height="16" rx="2" fill="#4ecca3">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Monitor stand -->
  <rect x="226" y="320" width="60" height="24" rx="4" fill="#2a2a4a"/>
  <rect x="196" y="344" width="120" height="12" rx="6" fill="#2a2a4a"/>

  <!-- === LEFT CLAW (pincer) === -->
  <g transform="translate(40, 200)">
    <!-- Upper pincer -->
    <path d="M 0 30 Q -10 0, 30 -40 Q 38 -48, 46 -38 Q 28 -10, 20 20 Z"
          fill="url(#clawGrad)" stroke="#a02040" stroke-width="2"/>
    <!-- Lower pincer -->
    <path d="M 0 50 Q -10 80, 30 120 Q 38 128, 46 118 Q 28 90, 20 60 Z"
          fill="url(#clawGrad)" stroke="#a02040" stroke-width="2"/>
    <!-- Joint -->
    <circle cx="10" cy="40" r="14" fill="#c23152" stroke="#a02040" stroke-width="2"/>
    <circle cx="10" cy="40" r="6" fill="#1a1a2e"/>
  </g>

  <!-- === RIGHT CLAW (pincer) === -->
  <g transform="translate(472, 200) scale(-1,1)">
    <!-- Upper pincer -->
    <path d="M 0 30 Q -10 0, 30 -40 Q 38 -48, 46 -38 Q 28 -10, 20 20 Z"
          fill="url(#clawGrad)" stroke="#a02040" stroke-width="2"/>
    <!-- Lower pincer -->
    <path d="M 0 50 Q -10 80, 30 120 Q 38 128, 46 118 Q 28 90, 20 60 Z"
          fill="url(#clawGrad)" stroke="#a02040" stroke-width="2"/>
    <!-- Joint -->
    <circle cx="10" cy="40" r="14" fill="#c23152" stroke="#a02040" stroke-width="2"/>
    <circle cx="10" cy="40" r="6" fill="#1a1a2e"/>
  </g>

  <!-- CCCLAW text -->
  <text x="256" y="420" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
        font-size="52" font-weight="800" letter-spacing="6" fill="#e0e0e0">CCCLAW</text>

  <!-- Subtle glow under text -->
  <ellipse cx="256" cy="438" rx="120" ry="6" fill="#e94560" opacity="0.15"/>
</svg>
